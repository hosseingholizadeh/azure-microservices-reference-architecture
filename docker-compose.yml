version: '3.8'

services:
  catalogservice:
    build: ./src/services/CatalogService
    ports:
      - "5001:80"

  orderservice:
    build: ./src/services/OrderService
    ports:
      - "5002:80"

  identityservice:
    build: ./src/services/IdentityService
    ports:
      - "5003:80"

  gateway:
    build: ./src/gateway/YarpGateway
    ports:
      - "5000:80"

  mongodb:
    image: mongo

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"

  redis:
    image: redis

  kafka:
    image: bitnami/kafka:latest